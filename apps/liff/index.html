<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE Harness LIFF</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; font-weight: 700; color: #06C755; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.5; }
    .btn { display: inline-block; background: #06C755; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; text-align: center; margin-top: 16px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #f4f4f4; color: #333; }
    .slot { border: 1px solid #e8e8e8; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .slot:hover { border-color: #06C755; background: #f0fff5; }
    .slot.selected { border-color: #06C755; background: #f0fff5; }
    .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day { text-align: center; padding: 8px 4px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .day:hover { background: #f0fff5; }
    .day.selected { background: #06C755; color: white; }
    .day.today { font-weight: 700; }
    .day.disabled { color: #ccc; cursor: not-allowed; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .success { text-align: center; padding: 40px; }
    .success .icon { font-size: 48px; margin-bottom: 16px; }
    input, textarea, select { width: 100%; border: 1px solid #e8e8e8; border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 12px; }
    label { font-size: 13px; color: #555; margin-bottom: 4px; display: block; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">読み込み中...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
